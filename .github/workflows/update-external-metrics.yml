name: Update external aggregate metrics

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ayudave
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update aggregate snapshot
        run: npm run metrics:update

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- external-metrics.json; then
            echo "No external metrics changes."
            exit 0
          fi
          git config user.name "ayudave-bot"
          git config user.email "actions@users.noreply.github.com"
          git add external-metrics.json
          git commit -m "Actualizar metricas externas agregadas"
          git push
